services:

  postgres:
    image: postgres:15
    container_name: kohabit_postgres
    environment:
      POSTGRES_USER: kohabit
      POSTGRES_PASSWORD: kohabit
      POSTGRES_DB: kohabit
    ports:
      - "5432:5432"

  endee:
    image: endee:latest  
    container_name: kohabit_endee
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: kohabit_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: kohabit_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - endee
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: kohabit_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  endee-data:
  ollama-data: